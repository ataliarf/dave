# Local development databases for the dave.io engineering assignment.
#
# Bring everything up with:
#   docker compose up -d
#
# Both services expose default ports on localhost so your backend (running on
# the host or in another compose file) can connect directly. Credentials and
# ports come from .env — see .env.example.

services:
  postgres:
    image: postgres:16-alpine
    container_name: daveio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dave}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dave}
      POSTGRES_DB: ${POSTGRES_DB:-dave}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dave}"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5-community
    container_name: daveio-neo4j
    restart: unless-stopped
    environment:
      # Format is user/password. Neo4j requires the password to be 8+ chars.
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4jneo4j}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # browser UI
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # driver protocol
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  neo4j-data:
  neo4j-logs:
